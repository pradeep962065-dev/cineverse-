<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse – Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #07090e;
            --card: #111520;
            --card2: #161b27;
            --border: rgba(255, 255, 255, 0.06);
            --gold: #e8b84b;
            --text: #e8e6e0;
            --muted: #5a5d68;
            --red: #e74c3c;
            --green: #27ae60;
            --blue: #3498db;
            --yellow: #f39c12;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 64px;
            background: rgba(7, 9, 14, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--gold), #fff5c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .wrap {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 48px;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 24px;
        }

        /* Search */
        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-row input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        .search-row input[type="text"]:focus {
            border-color: var(--gold);
        }

        .date-input-wrap {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .date-input-wrap input[type="date"] {
            padding: 12px 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        .date-input-wrap input[type="date"]:focus {
            border-color: var(--gold);
        }

        .btn-search {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--gold), #c9962a);
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            color: #0a0800;
            cursor: pointer;
        }

        .btn-clear {
            padding: 12px 20px;
            background: var(--card2);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        /* Message box */
        .msg-center {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .msg-box {
            padding: 32px 48px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
        }

        .msg-box .msg-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .msg-box .msg-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .msg-box .msg-text {
            font-size: 14px;
            color: var(--muted);
        }

        .msg-error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .msg-error .msg-title {
            color: var(--red);
        }

        .msg-info {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .msg-info .msg-title {
            color: var(--blue);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            color: var(--gold);
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Section */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 16px;
            color: var(--text);
        }

        .section-title span {
            color: var(--gold);
        }

        .active-filter-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            background: rgba(52, 152, 219, 0.15);
            color: var(--blue);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        /* Table */
        .movie-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            font-size: 13px;
        }

        .movie-table th {
            background: #161b27;
            padding: 10px 12px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .movie-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .movie-table tr:hover td {
            background: var(--card);
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-skip {
            background: rgba(231, 76, 60, 0.15);
            color: var(--red);
        }

        .badge-timepass {
            background: rgba(243, 156, 18, 0.15);
            color: var(--yellow);
        }

        .badge-goforit {
            background: rgba(39, 174, 96, 0.15);
            color: var(--green);
        }

        .badge-perfection {
            background: rgba(52, 152, 219, 0.15);
            color: var(--blue);
        }

        /* Date grid */
        .date-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .date-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-text {
            font-size: 13px;
            color: var(--muted);
        }

        .date-count {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--gold);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media(max-width:768px) {
            .wrap {
                padding: 24px 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            nav {
                padding: 0 20px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="nav-brand">CineVerse</a>
        <div style="display:flex;align-items:center;gap:16px;">
            <span style="font-size:13px;color:var(--gold);">👑 Admin Panel</span>
            <a href="/" style="font-size:13px;color:var(--muted);text-decoration:none;">Home</a>
            <a href="/logout" style="font-size:13px;color:var(--muted);text-decoration:none;">Logout</a>
        </div>
    </nav>

    <div class="wrap">
        <div class="page-title">📊 Admin Dashboard</div>

        <!-- Search Row -->
        <div class="search-row">
            <input type="text" id="movieSearch" placeholder="🎬 Search by movie name..." oninput="onMovieSearch()" />
            <div class="date-input-wrap">
                <input type="date" id="dateSearch" />
                <button class="btn-search" onclick="onDateSearch()">SEARCH DATE</button>
            </div>
            <button class="btn-clear" onclick="clearAll()">✕ Clear All</button>
        </div>

        <!-- Stats always visible -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="mainContent">
            <div class="loading">
                <div class="spinner"></div> Loading data...
            </div>
        </div>
    </div>

    <script>
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        async function getMovieTitle(movieId) {
            try {
                const res = await fetch(`/api/movie/${movieId}`);
                const data = await res.json();
                return data.movie ? data.movie.Title : movieId;
            } catch (e) { return movieId; }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();

                document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-num">${data.total_users}</div><div class="stat-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-num">${data.ratings.reduce((a, r) => a + r.total, 0)}</div><div class="stat-label">Total Ratings</div></div>
      <div class="stat-card"><div class="stat-num">${data.vibes.reduce((a, v) => a + v.total, 0)}</div><div class="stat-label">Total Vibes</div></div>
      <div class="stat-card"><div class="stat-num">${data.watchlist.reduce((a, w) => a + w.total, 0)}</div><div class="stat-label">Total Watchlists</div></div>
    `;

                const allIds = [...new Set([
                    ...data.ratings.map(r => r.movie_id),
                    ...data.watchlist.map(w => w.movie_id),
                    ...data.vibes.map(v => v.movie_id)
                ])];
                const titles = {};
                await Promise.all(allIds.map(async id => { titles[id] = await getMovieTitle(id); }));

                window.adminData = data;
                window.movieTitles = titles;

                showAllData();
            } catch (e) { console.error(e); }
        }

        function onMovieSearch() {
            // Clear date input when typing movie name
            document.getElementById('dateSearch').value = '';
            const query = document.getElementById('movieSearch').value.trim().toLowerCase();
            if (!query) { showAllData(); return; }
            showMovieSearch(query);
        }

        function onDateSearch() {
            const dateVal = document.getElementById('dateSearch').value;
            const today = getToday();

            // Clear movie search
            document.getElementById('movieSearch').value = '';

            if (!dateVal) {
                showMessage('error', '📅', 'No Date Selected', 'Please select a date before clicking Search.');
                return;
            }

            if (dateVal > today) {
                showMessage('error', '❌', 'Invalid Date!', `You entered a future date (${dateVal}). Please enter today's date or a past date.`);
                return;
            }

            // Valid date - check if data exists
            showDateSearch(dateVal);
        }

        function clearAll() {
            document.getElementById('movieSearch').value = '';
            document.getElementById('dateSearch').value = '';
            showAllData();
        }

        function showMessage(type, icon, title, text) {
            document.getElementById('mainContent').innerHTML = `
    <div class="msg-center">
      <div class="msg-box msg-${type}">
        <div class="msg-icon">${icon}</div>
        <div class="msg-title">${title}</div>
        <div class="msg-text">${text}</div>
      </div>
    </div>`;
        }

        function showAllData() {
            if (!window.adminData) return;
            const sortedRatings = [...window.adminData.ratings].sort((a, b) => b.total - a.total);
            const sortedWatch = [...window.adminData.watchlist].sort((a, b) => b.total - a.total);
            const sortedVibes = [...window.adminData.vibes].sort((a, b) => b.total - a.total);

            document.getElementById('mainContent').innerHTML = buildFullLayout(
                sortedRatings, window.adminData.ratings_detail,
                window.adminData.date_ratings,
                sortedWatch, window.adminData.watchlist_detail,
                sortedVibes, window.adminData.vibes_detail || [],
                null
            );
        }

        function showMovieSearch(query) {
            if (!window.adminData) return;

            const filteredRatings = window.adminData.ratings
                .filter(r => (window.movieTitles[r.movie_id] || '').toLowerCase().includes(query) || r.movie_id.toLowerCase().includes(query))
                .sort((a, b) => b.total - a.total);

            if (filteredRatings.length === 0) {
                showMessage('info', '🔍', 'No Results', `No movie found matching "${query}". Try a different name.`);
                return;
            }

            const matchedIds = new Set(filteredRatings.map(r => r.movie_id));
            const filteredDates = window.adminData.movie_date_ratings.filter(d => matchedIds.has(d.movie_id));
            const filteredWatch = window.adminData.watchlist.filter(w => (window.movieTitles[w.movie_id] || '').toLowerCase().includes(query)).sort((a, b) => b.total - a.total);
            const filteredVibes = window.adminData.vibes.filter(v => (window.movieTitles[v.movie_id] || '').toLowerCase().includes(query)).sort((a, b) => b.total - a.total);

            document.getElementById('mainContent').innerHTML = buildFullLayout(
                filteredRatings, window.adminData.ratings_detail.filter(r => matchedIds.has(r.movie_id)),
                filteredDates,
                filteredWatch, window.adminData.watchlist_detail.filter(w => filteredWatch.some(fw => fw.movie_id === w.movie_id)),
                filteredVibes, (window.adminData.vibes_detail || []).filter(v => filteredVibes.some(fv => fv.movie_id === v.movie_id)),
                `🎬 Results for: "${query}"`
            );
        }

        function showDateSearch(dateVal) {
            if (!window.adminData) return;

            const dateRatings = window.adminData.ratings_detail.filter(r => r.rated_on && r.rated_on.startsWith(dateVal));

            if (dateRatings.length === 0) {
                showMessage('info', '📭', 'No Activity Found', `No users rated any movies on ${dateVal}. Try a different date.`);
                return;
            }

            const dateMovieIds = [...new Set(dateRatings.map(r => r.movie_id))];
            const filteredSummary = window.adminData.ratings.filter(r => dateMovieIds.includes(r.movie_id)).sort((a, b) => b.total - a.total);

            const dateWatchlist = window.adminData.watchlist_detail.filter(w => w.added_on && w.added_on.startsWith(dateVal));
            const dateWatchIds = [...new Set(dateWatchlist.map(w => w.movie_id))];
            const filteredWatch = window.adminData.watchlist.filter(w => dateWatchIds.includes(w.movie_id)).sort((a, b) => b.total - a.total);

            const filteredVibes = window.adminData.vibes.filter(v => dateMovieIds.includes(v.movie_id)).sort((a, b) => b.total - a.total);
            const filteredVibesDetail = (window.adminData.vibes_detail || []).filter(v => dateMovieIds.includes(v.movie_id));

            document.getElementById('mainContent').innerHTML = buildFullLayout(
                filteredSummary, dateRatings,
                [{ date: dateVal, total: dateRatings.length }],
                filteredWatch, dateWatchlist,
                filteredVibes, filteredVibesDetail,
                `📅 Activity on: ${dateVal}`
            );
        }

        function buildFullLayout(ratings, ratingsDetail, dates, watchlist, watchlistDetail, vibes, vibesDetail, badge) {
            return `
    ${badge ? `<div class="active-filter-badge">${badge}</div>` : ''}
    <div class="section-title">🎬 Movie <span>Ratings</span></div>
    ${buildRatingsTable(ratings, ratingsDetail)}
    <div class="section-title">📅 Date Wise <span>Activity</span></div>
    ${buildDateGrid(dates)}
    <div class="section-title">📌 Watchlist <span>Stats</span></div>
    ${buildWatchlistTable(watchlist, watchlistDetail)}
    <div class="section-title">🎭 Vibe <span>Chart Stats</span></div>
    ${buildVibesTable(vibes, vibesDetail)}
  `;
        }

        function buildRatingsTable(ratings, details) {
            if (!ratings.length) return '<p style="color:var(--muted);padding:20px 0;">No ratings found.</p>';
            const detailMap = {};
            details.forEach(r => { if (!detailMap[r.movie_id]) detailMap[r.movie_id] = []; detailMap[r.movie_id].push(r); });

            let rows = '';
            ratings.forEach(r => {
                const dets = detailMap[r.movie_id] || [];
                const span = Math.max(dets.length, 1);
                rows += `<tr>
      <td rowspan="${span}"><a href="/movie/${r.movie_id}" style="color:var(--gold);text-decoration:none;">${window.movieTitles[r.movie_id] || r.movie_id}</a></td>
      <td>${dets[0] ? dets[0].username : '-'}</td>
      <td>${dets[0] ? dets[0].email : '-'}</td>
      <td>${dets[0] ? `<span class="badge badge-${(dets[0].meter_value || '').toLowerCase().replace(/ /g, '')}">${dets[0].meter_value}</span>` : '-'}</td>
      <td>${dets[0] ? dets[0].rated_on.split(' ')[0] : '-'}</td>
      <td rowspan="${span}">${r.total}</td>
      <td rowspan="${span}"><span class="badge badge-skip">${r.skip}</span></td>
      <td rowspan="${span}"><span class="badge badge-timepass">${r.timepass}</span></td>
      <td rowspan="${span}"><span class="badge badge-goforit">${r.goforit}</span></td>
      <td rowspan="${span}"><span class="badge badge-perfection">${r.perfection}</span></td>
    </tr>`;
                dets.slice(1).forEach(d => {
                    rows += `<tr>
        <td>${d.username}</td><td>${d.email}</td>
        <td><span class="badge badge-${(d.meter_value || '').toLowerCase().replace(/ /g, '')}">${d.meter_value}</span></td>
        <td>${d.rated_on.split(' ')[0]}</td>
      </tr>`;
                });
            });
            return `<table class="movie-table">
    <thead><tr><th>Movie Name</th><th>Username</th><th>Email</th><th>Rating</th><th>Date</th><th>Total</th><th>Skip</th><th>Timepass</th><th>Go for It</th><th>Perfection</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
        }

        function buildDateGrid(dates) {
            if (!dates || !dates.length) return '<p style="color:var(--muted);padding:20px 0;">No date data found.</p>';
            return `<div class="date-grid">${dates.map(d => `
    <div class="date-card"><div class="date-text">${d.date}</div><div class="date-count">${d.total}</div></div>`).join('')}</div>`;
        }

        function buildWatchlistTable(watchlist, details) {
            if (!watchlist.length) return '<p style="color:var(--muted);padding:20px 0;">No watchlist data found.</p>';
            const detailMap = {};
            details.forEach(w => { if (!detailMap[w.movie_id]) detailMap[w.movie_id] = []; detailMap[w.movie_id].push(w); });

            let rows = '';
            watchlist.forEach(w => {
                const dets = detailMap[w.movie_id] || [];
                const span = Math.max(dets.length, 1);
                rows += `<tr>
      <td rowspan="${span}"><a href="/movie/${w.movie_id}" style="color:var(--gold);text-decoration:none;">${window.movieTitles[w.movie_id] || w.movie_id}</a></td>
      <td>${dets[0] ? dets[0].username : '-'}</td>
      <td>${dets[0] ? dets[0].email : '-'}</td>
      <td>${dets[0] ? dets[0].added_on.split(' ')[0] : '-'}</td>
      <td rowspan="${span}">${w.total}</td>
    </tr>`;
                dets.slice(1).forEach(d => {
                    rows += `<tr><td>${d.username}</td><td>${d.email}</td><td>${d.added_on.split(' ')[0]}</td></tr>`;
                });
            });
            return `<table class="movie-table">
    <thead><tr><th>Movie Name</th><th>Username</th><th>Email</th><th>Added On</th><th>Total Saves</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
        }

        function buildVibesTable(vibes, details) {
            if (!vibes.length) return '<p style="color:var(--muted);padding:20px 0;">No vibe data found.</p>';
            const detailMap = {};
            details.forEach(v => { if (!detailMap[v.movie_id]) detailMap[v.movie_id] = []; detailMap[v.movie_id].push(v); });

            let rows = '';
            vibes.forEach(v => {
                const dets = detailMap[v.movie_id] || [];
                const span = Math.max(dets.length, 1);
                rows += `<tr>
      <td rowspan="${span}"><a href="/movie/${v.movie_id}" style="color:var(--gold);text-decoration:none;">${window.movieTitles[v.movie_id] || v.movie_id}</a></td>
      <td>${dets[0] ? dets[0].username : '-'}</td>
      <td>${dets[0] ? dets[0].email : '-'}</td>
      <td rowspan="${span}">${v.total}</td>
      <td rowspan="${span}">${v.action}%</td>
      <td rowspan="${span}">${v.romance}%</td>
      <td rowspan="${span}">${v.comedy}%</td>
      <td rowspan="${span}">${v.thriller}%</td>
      <td rowspan="${span}">${v.drama}%</td>
    </tr>`;
                dets.slice(1).forEach(d => {
                    rows += `<tr><td>${d.username}</td><td>${d.email}</td></tr>`;
                });
            });
            return `<table class="movie-table">
    <thead><tr><th>Movie Name</th><th>Username</th><th>Email</th><th>Total</th><th>Action</th><th>Romance</th><th>Comedy</th><th>Thriller</th><th>Drama</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
        }

        loadStats();
    </script>
</body>

</html>
